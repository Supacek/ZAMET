<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;

    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    width: 100vw;
    height: 100vh;

    object-fit: contain;

    transition: opacity 2s;
}
</style>
</head>

<body>

<img id="slide" src="">

<script>

const images = [

    "hledamekoleg.jpg",
    "fotbal.jpg"

];

let index = 0;

const slide = document.getElementById("slide");

function showImage() {

    slide.style.opacity = 0;

    setTimeout(() => {

        slide.src =
        images[index] + "?v=" + Date.now();

        slide.style.opacity = 1;

        index++;

        if(index >= images.length){
            index = 0;
        }

    }, 500);
}

showImage();

setInterval(showImage, 10000);

</script>

</body>
</html>
