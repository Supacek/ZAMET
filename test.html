```html
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* HLAVNÍ OBLAST */

#content {

    width: 100vw;

    height: calc(100vh - 90px);

    display: flex;

    justify-content: center;
    align-items: center;

    background: black;
}

/* OBRÁZEK */

#slide {

    width: 100%;
    height: 100%;

    object-fit: contain;

    transition: opacity 2s;
}

/* SPODNÍ LIŠTA */

#ticker-bar {

    width: 100vw;

    height: 90px;

    background: #141b7b;

    border-top: 4px solid red;

    overflow: hidden;

    display: flex;

    align-items: center;
}

/* TEXT */

#ticker {

    white-space: nowrap;

    color: white;

    font-size: 42px;

    font-family: Arial, sans-serif;

    font-weight: bold;

    line-height: 90px;

    padding-left: 100%;

    will-change: transform;

    transform: translate3d(0,0,0);

    animation: tickerMove 45s linear infinite;
}

/* ANIMACE */

@keyframes tickerMove {

    0% {
        transform: translateX(0);
    }

    100% {
        transform: translateX(-100%);
    }
}

</style>
</head>

<body>

<!-- OBRÁZEK -->

<div id="content">

    <img id="slide" src="">

</div>

<!-- BĚŽÍCÍ TEXT -->

<div id="ticker-bar">

    <div id="ticker">

        Hokej tipovačka je ukončená •
        1. místo: Daniel Vraj •
        2. místo: Martin Orság •
        3. místo: Renata Rajmicová, Helena Manaková a Jiří Tkadlec •
        Gratulujeme výhercům •
        Hledáme nové kolegy •
        Kariéra ZAMET •
        Více informací na karierazamet.cz •
        Nástup možný ihned

    </div>

</div>

<script>

const images = [

    "hledamekoleg.jpg",
    "fotbal.jpg"

];

let index = 0;

const slide = document.getElementById("slide");

function showImage() {

    slide.style.opacity = 0;

    setTimeout(() => {

        slide.src =
        images[index] + "?v=" + Date.now();

        slide.style.opacity = 1;

        index++;

        if(index >= images.length){
            index = 0;
        }

    }, 500);
}

showImage();

setInterval(showImage, 10000);

</script>

</body>
</html>
