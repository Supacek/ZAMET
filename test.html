<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>

html, body {

    margin: 0;
    width: 100%;
    height: 100%;

    overflow: hidden;

    background: black;

    font-family: Arial, sans-serif;

    color: white;
}

/* HLAVNÍ LAYOUT */

#main {

    display: flex;

    width: 100vw;

    height: calc(100vh - 70px);
}

/* LEVÝ PANEL */

#sidebar {

    width: 340px;

    background: #0b0f3d;

    border-right: 3px solid #ff0000;

    display: flex;

    flex-direction: column;

    justify-content: flex-start;

    align-items: center;

    padding-top: 30px;

    box-sizing: border-box;
}

/* DATUM */

#date {

    font-size: 34px;

    font-weight: bold;

    margin-bottom: 30px;

    text-align: center;
}

/* ČESKÝ SVÁTEK */

#nameday-title {

    font-size: 24px;

    color: #bbbbbb;

    margin-bottom: 10px;
}

#nameday {

    font-size: 42px;

    font-weight: bold;

    color: #ffffff;

    text-align: center;

    padding: 0 20px;
}

/* UKRAJINSKÝ SVÁTEK */

#ua-title {

    font-size: 22px;

    color: #bbbbbb;

    margin-top: 40px;

    margin-bottom: 10px;
}

#ua-nameday {

    font-size: 34px;

    font-weight: bold;

    color: #ffd700;

    text-align: center;

    padding: 0 20px;
}

/* PRAVÁ ČÁST */

#content {

    flex: 1;

    display: flex;

    justify-content: center;
    align-items: center;

    background: black;
}

/* OBRÁZEK */

#slide {

    width: 100%;
    height: 100%;

    object-fit: contain;

    opacity: 1;

    transition: opacity 2s ease-in-out;

    background: black;
}

/* SPODNÍ LIŠTA */

#ticker-bar {

    width: 100vw;

    height: 70px;

    background: #0b0f3d;

    border-top: 3px solid #ff0000;

    overflow: hidden;

    display: flex;

    align-items: flex-start;
}

/* TEXT */

#ticker {

    white-space: nowrap;

    color: white;

    font-size: 30px;

    font-weight: bold;

    letter-spacing: 1px;

    padding-left: 100%;

    padding-top: 4px;

    display: flex;

    align-items: flex-start;

    height: 100%;

    will-change: transform;

    transform: translate3d(0,0,0);

    animation: tickerMove 40s linear infinite;
}

/* ANIMACE */

@keyframes tickerMove {

    0% {

        transform: translate3d(0,0,0);
    }

    100% {

        transform: translate3d(-100%,0,0);
    }
}

</style>
</head>

<body>

<!-- HLAVNÍ OBSAH -->

<div id="main">

    <!-- LEVÝ PANEL -->

    <div id="sidebar">

        <div id="date"></div>

        <div id="nameday-title">
            Dnes má svátek
        </div>

        <div id="nameday"></div>

        <div id="ua-title">
            Українське свято
        </div>

        <div id="ua-nameday"></div>

    </div>

    <!-- OBRÁZKY -->

    <div id="content">

        <img id="slide" src="">

    </div>

</div>

<!-- SPODNÍ TEXT -->

<div id="ticker-bar">

    <div id="ticker">

        Hokej tipovačka je ukončená •
        1. místo: Daniel Vraj •
        2. místo: Martin Orság •
        3. místo: Renata Rajmicová, Helena Manaková a Jiří Tkadlec •
        Gratulujeme výhercům •
        Hledáme nové kolegy •
        Kariéra ZAMET •
        Více informací na karierazamet.cz •
        Nástup možný ihned

    </div>

</div>

<!-- SVÁTKY -->

<script src="svatek.js"></script>

<script>

/* OBRÁZKY */

const images = [

    "hledamekoleg.jpg",
    "fotbal.jpg"

];

/* SLIDESHOW */

let index = 0;

const slide = document.getElementById("slide");

function showImage() {

    slide.style.opacity = 0;

    setTimeout(() => {

        slide.src =
            images[index] + "?v=" + Date.now();

        slide.onload = () => {

            slide.style.opacity = 1;
        };

        index++;

        if(index >= images.length) {

            index = 0;
        }

    }, 1500);
}

showImage();

setInterval(showImage, 10000);

/* DATUM */

const today = new Date();

const options = {

    day: 'numeric',
    month: 'long',
    year: 'numeric'
};

document.getElementById("date").innerHTML =

    today.toLocaleDateString('cs-CZ', options);

/* KLÍČ DATA */

const key =

    today.getDate() + "-" + (today.getMonth()+1);

/* ČESKÝ SVÁTEK */

document.getElementById("nameday").innerHTML =

    namedays[key] || "—";

/* UKRAJINSKÝ SVÁTEK */

document.getElementById("ua-nameday").innerHTML =

    uaNamedays[key] || "—";

</script>

</body>
</html>
