```html
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* SLIDESHOW */

img {
    width: 100vw;
    height: 100vh;

    object-fit: contain;

    transition: opacity 2s;
}

/* TICKER */

.ticker-wrap {
    position: fixed;

    bottom: 0;
    left: 0;

    width: 100%;

    background: rgba(0,0,0,0.85);

    overflow: hidden;

    height: 60px;

    display: flex;
    align-items: center;

    border-top: 3px solid #e30613;
}

.ticker {
    white-space: nowrap;

    color: white;

    font-size: 32px;

    font-family: Arial, sans-serif;

    font-weight: bold;

    padding-left: 100%;

    animation: tickerMove 25s linear infinite;
}

@keyframes tickerMove {
    0% {
        transform: translateX(0);
    }

    100% {
        transform: translateX(-100%);
    }
}
</style>
</head>

<body>

<img id="slide" src="">

<div class="ticker-wrap">
    <div class="ticker">
        🔴 Hledáme nové kolegy • 
        🔵 Nábor probíhá v Halenkově • 
        🟢 Více informací na karierazamet.cz • 
        🟡 Sledujte aktuální novinky společnosti ZAMET
    </div>
</div>

<script>

const images = [

    "hledamekoleg.jpg",
    "fotbal.jpg"

];

let index = 0;

const slide = document.getElementById("slide");

function showImage() {

    slide.style.opacity = 0;

    setTimeout(() => {

        slide.src =
        images[index] + "?v=" + Date.now();

        slide.style.opacity = 1;

        index++;

        if(index >= images.length){
            index = 0;
        }

    }, 500);
}

showImage();

setInterval(showImage, 10000);

</script>

</body>
</html>
```
