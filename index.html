<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

.container {
    display: flex;
    width: 100vw;
    height: 100vh;
}

.image-box {
    flex: 1;
    overflow: hidden;
}

img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}
</style>
</head>

<body>

<div class="container">

    <div class="image-box">
        <img src="hledamekoleg.jpg">
    </div>

    <div class="image-box">
        <img src="fotbal.jpg">
    </div>

</div>

</body>
</html>
